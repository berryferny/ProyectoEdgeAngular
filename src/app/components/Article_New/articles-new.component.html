<div class="center">
    <section id="content">

        <h1 class="subheader">Crear articulo</h1>

        <form class="mid-form" #articleForm="ngForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="title">Titulo</label>
                <input type="text" name="title" #title="ngModel" [(ngModel)]="article.title" />
            </div>

            <div class="form-group">
                <label for="content">Contenido</label>
                <textarea name="content" #content="ngModel" [(ngModel)]="article.content"></textarea>
            </div>

            <div class="form-group">
                <label for="image">Imagen</label>
                <input type="file" name="file0" />
            </div>


            <div class="clearfix"></div>

            <input type="submit" value="Enviar" class="btn btn-success" />

        </form>

    </section>

    <aside id="sidebar">
        <div id="nav-blog" class="sidebar-item">
            <h3>Puedes hacer esto</h3>
            <a href="#" class="btn btn-success">Crear artículo</a>
        </div>

        <div id="search" class="sidebar-item">
            <h3>Buscador</h3>
            <p>Encuentra el artículo que buscas</p>
            <form>
                <input type="text" name="search" />
                <input type="submit" name="submit" value="Buscar" class="btn" />
            </form>
        </div>
    </aside>

    <div class="clearfix"></div>
    
</div>
